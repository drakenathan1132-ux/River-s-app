<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - RIVERS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .offline-icon {
            width: 120px;
            height: 120px;
            background: #ff4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-size: 60px;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #999; margin-bottom: 30px; line-height: 1.6; }
        button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #ff8833; transform: scale(1.05); }
        .info {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            max-width: 400px;
        }
        .info h3 { font-size: 16px; margin-bottom: 10px; color: #ff6600; }
        .info p { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div class="offline-icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>No hay conexión a internet.<br>Verifica tu red WiFi o datos móviles.</p>
    <button onclick="location.reload()">Reintentar Conexión</button>
    
    <div class="info">
        <h3>💡 Mientras tanto...</h3>
        <p>Si marcaste tu asistencia sin conexión, se guardó localmente y se enviará automáticamente cuando recuperes la señal.</p>
    </div>
</body>
</html>
