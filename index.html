<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVERS Tochito Club</title>
    
    <style>
        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0A0A0A;
            color: #f0f0f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 80px; /* Espacio para la barra inferior */
        }

        /* OCULTAR SECCIONES */
        .section-content {
            display: none; /* Todo apagado por defecto */
        }

        .section-content.active {
            display: block !important; /* Solo la sección activa se ve */
        }

        /* DISEÑO DE LA BARRA INFERIOR */
        .bottom-nav {
            background: rgba(15, 15, 15, 0.98) !important;
            backdrop-filter: blur(10px);
            border-top: 1px solid #00FFFF;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            background: transparent !important;
            color: #888 !important;
            border: none !important;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #00FFFF !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: #00FFFF;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="status-bar" style="background: #000; color: #00FFFF; text-align: center; padding: 10px; border-bottom: 1px solid #00FFFF; font-family: monospace; font-size: 12px;">
        [ RIVERS CONTROL: ACTIVO ]
    </div>

    <main class="max-w-md mx-auto px-4 py-6" style="max-width: 500px; margin: auto;">
        
        <div id="reglamento" class="section-content active">
            <div class="glass-card">
                <h2 style="color: #00FFFF;">📋 Reglamento Oficial</h2>
                <div style="font-size: 14px; line-height: 1.6; color: #ccc;">
                    <h3 style="color: #fff;">SECCIÓN I - ASISTENCIA</h3>
                    <p><strong>Art 1.</strong> Tolerancia de 15 minutos.</p>
                    <p><strong>Art 2.</strong> 3 Retardos = 1 Falta.</p>
                    <p><strong>Art 3.</strong> 3 Faltas = Baja automática.</p>
                </div>
            </div>
        </div>

        <div id="checkin" class="section-content">
            <div class="glass-card">
                <h2 style="color: #00FFFF;">📱 Check-In QR</h2>
                <button class="btn-primary">🎯 Iniciar Escaneo</button>
            </div>
        </div>

        <div id="dashboard" class="section-content">
            <div class="glass-card">
                <h2 style="color: #00FFFF;">📊 Dashboard</h2>
                <p>No hay registros hoy.</p>
            </div>
        </div>

        <div id="admin" class="section-content">
            <div class="glass-card">
                <h2 style="color: #00FFFF;">🔐 Panel Admin</h2>
                <button class="btn-primary">🔓 Desbloquear Panel</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showSection('reglamento')">
            <span>📋</span><br>Reglamento
        </div>
        <div class="nav-item" onclick="showSection('checkin')">
            <span>📱</span><br>Check-In
        </div>
        <div class="nav-item" onclick="showSection('dashboard')">
            <span>📊</span><br>Dashboard
        </div>
        <div class="nav-item" onclick="showSection('admin')">
            <span>🔐</span><br>Admin
        </div>
    </nav>

    <script>
        function showSection(sectionId) {
            // 1. Esconder todas las secciones
            document.querySelectorAll('.section-content').forEach(section => {
                section.classList.remove('active');
            });

            // 2. Mostrar la sección elegida
            const target = document.getElementById(sectionId);
            if (target) {
                target.classList.add('active');
            }

            // 3. Actualizar color de los botones
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // 4. Subir al inicio
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
