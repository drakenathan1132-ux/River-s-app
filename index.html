<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RIVERS Command Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        :root { --primary: #ff6600; --bg-dark: #0A0A0A; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* Sidebar Navigation */
        #sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #111;
            z-index: 100;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #333;
        }
        #sidebar.open { left: 0; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 90;
        }
        .overlay.active { display: block; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body class="bg-[#0A0A0A]">

    <div id="sidebar" class="p-6">
        <div class="flex flex-col h-full">
            <div class="mb-10 pt-4 text-center">
                <img src="/logo.png" class="w-20 h-20 mx-auto rounded-full border-2 border-orange-500 mb-2">
                <h2 class="font-bold text-xl">RIVERS</h2>
                <p class="text-xs text-gray-500">Menú Táctico</p>
            </div>
            
            <nav class="space-y-2 flex-grow">
                <button onclick="navTo('home')" class="w-full text-left p-4 hover:bg-orange-600/20 rounded-xl transition flex items-center gap-3">🏠 Inicio</button>
                <button onclick="navTo('scan')" class="w-full text-left p-4 hover:bg-orange-600/20 rounded-xl transition flex items-center gap-3">📷 Escanear QR</button>
                <button onclick="navTo('feed')" class="w-full text-left p-4 hover:bg-orange-600/20 rounded-xl transition flex items-center gap-3">📢 Avisos</button>
                <button onclick="navTo('coach')" class="w-full text-left p-4 hover:bg-orange-600/20 rounded-xl transition flex items-center gap-3 border-t border-gray-800 mt-4 pt-4">👨‍💼 Coach</button>
            </nav>
            
            <p class="text-[10px] text-center text-gray-600">v2.1 Build April 2026</p>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/90 z-50 border-b border-white/5 backdrop-blur-md">
        <button id="menuBtn" onclick="toggleMenu()" class="p-2 bg-white/5 rounded-lg active:scale-90 transition">
            <svg class="w-7 h-7 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-16 6h16"/>
            </svg>
        </button>
        <div class="text-right">
            <span id="statusBadge" class="text-[10px] px-2 py-1 rounded-full bg-green-900 text-green-300">ONLINE</span>
        </div>
    </header>

    <main class="p-4 pb-20 max-w-lg mx-auto">
        
        <section id="home" class="tab-content active">
            <div class="glass p-6 mb-6">
                <h3 class="text-gray-400 text-sm mb-1 uppercase font-bold">Próxima Sesión</h3>
                <div class="flex justify-between items-end">
                    <div>
                        <p id="displayDay" class="text-2xl font-bold text-orange-500 leading-tight">Cargando...</p>
                        <p id="displayTime" class="text-gray-300">16:45 hrs</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-orange-500/10 text-orange-500 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">Cancha Principal</span>
                    </div>
                </div>
            </div>

            <div class="glass p-6 text-center mb-6">
                <h3 class="font-bold mb-4">Registro Rápido</h3>
                <select id="playerSelect" class="w-full p-4 bg-black/50 border border-white/10 rounded-xl mb-4 text-white appearance-none"></select>
                <button onclick="sendManualEntry()" class="w-full bg-orange-600 py-4 rounded-xl font-bold active:scale-95 transition shadow-lg shadow-orange-900/20">MARCAR ASISTENCIA</button>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="glass p-4 text-center"><p id="stat-asist" class="text-xl font-bold text-green-500">0</p><p class="text-[10px] text-gray-500">ASIST.</p></div>
                <div class="glass p-4 text-center"><p id="stat-retard" class="text-xl font-bold text-yellow-500">0</p><p class="text-[10px] text-gray-500">RETARD.</p></div>
                <div class="glass p-4 text-center"><p id="stat-falt" class="text-xl font-bold text-red-500">0</p><p class="text-[10px] text-gray-500">FALTAS</p></div>
            </div>
        </section>

        <section id="scan" class="tab-content">
            <div class="glass p-4">
                <h2 class="text-xl font-bold mb-4">📷 Escáner de Campo</h2>
                <div id="reader" class="rounded-2xl overflow-hidden mb-4"></div>
                <div id="scanResult" class="p-4 bg-white/5 rounded-xl text-center hidden"></div>
            </div>
        </section>

        <section id="coach" class="tab-content">
            <div id="coachLogin" class="glass p-8 text-center">
                <p class="text-gray-400 mb-4">Solo Jesús</p>
                <input type="password" id="coachPIN" placeholder="PIN" class="w-full bg-black border border-white/10 p-4 rounded-xl text-center text-2xl tracking-[1em] mb-4">
                <button onclick="unlockCoach()" class="w-full bg-orange-600 p-4 rounded-xl font-bold">DESBLOQUEAR</button>
            </div>

            <div id="coachPanel" class="hidden space-y-4">
                <div class="glass p-6">
                    <h2 class="font-bold mb-4 text-orange-500">Ajustes de Sesión</h2>
                    <label class="text-xs text-gray-400">Día de Entrenamiento</label>
                    <select id="configDay" class="w-full p-3 bg-black rounded-lg mb-3">
                        <option value="Martes">Martes</option>
                        <option value="Jueves">Jueves</option>
                    </select>
                    <label class="text-xs text-gray-400">Hora de Inicio</label>
                    <input type="time" id="configTime" value="16:45" class="w-full p-3 bg-black rounded-lg mb-4">
                    <button onclick="updateSession()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">GUARDAR CONFIG</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw_4wK-gG4yhXQUNUWYV8r2OjMcxETNWNnWXsI-m7nPBOCZPZkKg14F9OMcNrt-_vTjtA/exec";
        let config = { day: 'Martes', time: '16:45', tolerance: 15 };
        
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function navTo(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            toggleMenu();
            if(tabId === 'scan') startScanner();
        }

        function calculateNextSession() {
            const days = { 'Martes': 2, 'Jueves': 4 };
            document.getElementById('displayDay').innerText = config.day + " Próximo";
            document.getElementById('displayTime').innerText = config.time + " hrs";
        }

        async function sendManualEntry() {
            const name = document.getElementById('playerSelect').value;
            const now = new Date();
            const [h, m] = config.time.split(':');
            const limit = new Date().setHours(h, parseInt(m) + config.tolerance);
            
            const status = (now > limit) ? "RETARDO" : "PRESENTE";
            
            // Envío a Google Sheets
            alert(`Registrando a ${name} como ${status}`);
        }

        function unlockCoach() {
            if(document.getElementById('coachPIN').value === '2000') {
                document.getElementById('coachLogin').classList.add('hidden');
                document.getElementById('coachPanel').classList.remove('hidden');
            }
        }

        function updateSession() {
            config.day = document.getElementById('configDay').value;
            config.time = document.getElementById('configTime').value;
            calculateNextSession();
            alert("Configuración de entrenamiento actualizada.");
        }

        // Inicialización
        window.onload = () => {
            calculateNextSession();
            // Cargar jugadoras (Simulado o desde API)
            const players = ["Andrea", "Sofía", "Regina", "Valeria"];
            document.getElementById('playerSelect').innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
        };
    </script>
</body>
</html>
