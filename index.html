<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVERS HUB PRO</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #00FFFF; --purple: #7000FF; --bg: #050505; --glass: rgba(255,255,255,0.07); }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin: 15px; }
        header { padding: 40px 20px 20px; text-align: center; background: radial-gradient(circle at top, #00FFFF11 0%, transparent 70%); }
        .logo { width: 80px; filter: drop-shadow(0 0 15px var(--neon)); cursor: pointer; }
        #view-coach, #view-rules, #view-admin-tools { display: none; }
        .coach-active #view-alumna { display: none; }
        .coach-active #view-coach { display: block; }
        .post-card { background: var(--glass); border-radius: 20px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--neon); }
        .badge { background: var(--purple); font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; margin-left: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: rgba(10,10,10,0.95); border-top: 1px solid #222; z-index: 100; }
        .nav-btn { color: #555; font-size: 1.5rem; cursor: pointer; }
        .nav-btn.active { color: var(--neon); }
        #ai-trigger { position: fixed; right: 20px; bottom: 90px; width: 60px; height: 60px; background: linear-gradient(45deg, var(--neon), var(--purple)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon); z-index: 200; }
        #ai-console { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; display: none; flex-direction: column; padding: 20px; }
        .btn-action { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; margin-top: 10px; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body id="main-body">

<header>
    <img src="logo.png" class="logo" onclick="coachAuthAttempt()">
    <h1 id="app-title" style="letter-spacing:2px;">RIVERS HUB</h1>
</header>

<main id="view-alumna" class="page-content">
    <div class="glass">
        <h3 style="color:var(--neon)">🗞️ Noticias del Club</h3>
        <div id="social-container">
            <div class="post-card">
                <div style="color:var(--neon); font-weight:bold;">SISTEMA <span class="badge">ACTUALIZADO</span></div>
                <p>App Rivers Pro v2.0 activada. Bienvenidas al nuevo Hub.</p>
            </div>
        </div>
    </div>
    
    <div class="glass">
        <h3>📱 Check-In</h3>
        <select id="playerSelect"><option value="">Cargando lista...</option></select>
        <button class="btn-action" onclick="registerAttendance()">REGISTRAR ENTRADA</button>
    </div>
</main>

<main id="view-rules" class="page-content">
    <div class="glass">
        <h2 style="color:var(--neon)">📋 Reglamento</h2>
        <p><strong>Art 1.</strong> 15 min de tolerancia.</p>
        <p><strong>Art 2.</strong> 3 retardos = 1 falta.</p>
        <p><strong>Art 3.</strong> 3 faltas = baja.</p>
    </div>
</main>

<main id="view-coach" class="page-content">
    <div class="glass">
        <h2 style="color:var(--purple)">⚡ PANEL DE CONTROL</h2>
        <textarea id="postContent" placeholder="Escribe un aviso para las alumnas..."></textarea>
        <button class="btn-action" onclick="sendPost()">PUBLICAR AVISO</button>
    </div>
    <div class="glass" id="admin-players">
        <h3>👥 Gestión de Jugadoras</h3>
        <input type="text" id="newPlayer" placeholder="Nombre completo">
        <button class="btn-action" style="background:var(--purple); color:white;" onclick="addPlayer()">AÑADIR JUGADORA</button>
    </div>
</header>

<div id="ai-trigger" onclick="toggleAI()">🤖</div>
<div id="ai-console">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--neon)">IA COACH</h2>
        <button onclick="toggleAI()" style="background:none; border:none; color:#fff; font-size:2rem;">×</button>
    </div>
    <iframe src="https://www.blackbox.ai" style="flex-grow:1; border:none; border-radius:15px; background:white;"></iframe>
</div>

<nav>
    <div class="nav-btn active" onclick="navTo('view-alumna')">🏠</div>
    <div class="nav-btn" onclick="navTo('view-rules')">📋</div>
    <div class="nav-btn" onclick="logout()">🔒</div>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_4wK-gG4yhXQUNUWYV8r2OjMcxETNWNnWXsI-m7nPBOCZPZkKg14F9OMcNrt-_vTjtA/exec";
    let players = JSON.parse(localStorage.getItem('rivers_players')) || ["Tadeo Solis", "Jesús Bonilla", "Joshua", "Lia Rodriguez"];
    let logoClicks = 0;

    function coachAuthAttempt() {
        logoClicks++;
        if(logoClicks >= 5) {
            if(prompt("PIN DE COACH:") === "2000") {
                document.body.classList.add('coach-active');
                document.getElementById('app-title').innerText = "RIVERS COMMAND";
            }
            logoClicks = 0;
        }
    }

    function navTo(viewId) {
        document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
        document.getElementById(viewId).style.display = 'block';
    }

    async function registerAttendance() {
        const name = document.getElementById('playerSelect').value;
        if(!name) return alert("Selecciona nombre");
        
        const data = { type: "attendance", name: name, status: "PRESENTE", date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() };
        
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Sincronizado.");
        } catch(e) {
            alert("Guardado offline.");
        }
    }

    function addPlayer() {
        const name = document.getElementById('newPlayer').value;
        if(name) {
            players.push(name);
            localStorage.setItem('rivers_players', JSON.stringify(players));
            renderPlayers();
            document.getElementById('newPlayer').value = '';
        }
    }

    function renderPlayers() {
        const select = document.getElementById('playerSelect');
        select.innerHTML = players.sort().map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function toggleAI() {
        const con = document.getElementById('ai-console');
        con.style.display = (con.style.display === 'flex') ? 'none' : 'flex';
    }

    function logout() { location.reload(); }
    
    renderPlayers();
</script>
</body>
</html>
