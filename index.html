<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVERS Tochito Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #1e40af; /* Azul Eléctrico */
            --accent-red: #dc2626;   /* Rojo Intenso */
            --bg-dark: #050505;
            --bg-card: #111111;
        }
        
        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .btn-rivers {
            background: linear-gradient(135deg, var(--primary-blue), #3b82f6);
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4);
            transition: all 0.2s ease;
        }
        
        .btn-rivers:active { transform: scale(0.95); }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0a0a0a; z-index: 1000; transition: 0.3s;
            border-right: 1px solid #222;
        }
        .sidebar.open { left: 0; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .status-online { background: #10b981; padding: 4px 10px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>

    <aside id="sidebar" class="sidebar p-6">
        <div class="flex items-center gap-3 mb-8 border-b border-white/5 pb-4">
            <img src="/logo.png" class="w-12 h-12 rounded-full border-2 border-blue-600">
            <div>
                <h2 class="font-bold">RIVERS</h2>
                <p class="text-[10px] text-gray-500">Tochito Club</p>
            </div>
        </div>
        <nav class="space-y-2">
            <button onclick="navTo('home')" class="w-full text-left p-4 hover:bg-blue-900/20 rounded-xl">🏠 Inicio</button>
            <button onclick="navTo('scan')" class="w-full text-left p-4 hover:bg-blue-900/20 rounded-xl">📷 Escanear QR</button>
            <button onclick="navTo('coach')" class="w-full text-left p-4 hover:bg-red-900/20 rounded-xl border-t border-white/5 mt-4 pt-4">👨‍💼 Coach Panel</button>
        </nav>
    </aside>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-white/5">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="p-2">
            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="flex items-center gap-2">
            <span class="status-online font-bold uppercase">En Línea</span>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <section id="home" class="tab-content active">
            <div class="glass-card p-6 mb-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-20 h-20 bg-blue-600/10 blur-2xl"></div>
                <h2 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-2">Próxima Sesión</h2>
                <p class="text-3xl font-black italic mb-1">MARTES Y JUEVES</p>
                <p class="text-sm text-gray-400">16:45 hrs • <span class="text-white font-bold">La Laguna, Coscomatepec</span></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass-card p-5 text-center">
                    <p class="text-2xl font-bold text-blue-500">0</p>
                    <p class="text-[10px] text-gray-500 uppercase">Asistencias</p>
                </div>
                <div class="glass-card p-5 text-center">
                    <p class="text-2xl font-bold text-red-600">0</p>
                    <p class="text-[10px] text-gray-500 uppercase">Faltas</p>
                </div>
            </div>
            
            <div class="text-center p-4">
                <p class="text-gray-500 text-xs italic">"Siempre en el momento exacto"</p>
            </div>
        </section>

        <section id="scan" class="tab-content">
            <div class="glass-card p-8 text-center border-2 border-blue-600/30">
                <h2 class="text-2xl font-bold mb-2">Pase de Lista</h2>
                <p id="timeInfo" class="text-[10px] text-gray-500 mb-6 font-mono"></p>
                
                <div id="checkinForm">
                    <select id="playerSelect" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 outline-none text-sm">
                        </select>
                    <button onclick="submitAttendance()" class="btn-rivers w-full py-4 rounded-2xl font-black tracking-tighter">CONFIRMAR LLEGADA</button>
                </div>
                <div id="lockMsg" class="hidden py-10">
                    <span class="text-red-500 font-bold">🔒 REGISTRO CERRADO</span>
                    <p class="text-[10px] text-gray-500 mt-2">Solo disponible 16:00 - 17:30</p>
                </div>
            </div>
        </section>

        <section id="coach" class="tab-content">
            <div id="coachAuth" class="glass-card p-8 text-center">
                <h3 class="font-bold mb-4">Acceso Coaches</h3>
                <input type="password" id="pin" placeholder="PIN" class="w-32 bg-black border border-white/10 p-3 rounded-xl text-center mb-4 block mx-auto outline-none">
                <button onclick="loginCoach()" class="w-full bg-white text-black py-3 rounded-xl font-bold">ENTRAR</button>
            </div>
            <div id="coachTools" class="hidden space-y-3">
                <button class="w-full p-4 glass-card text-left flex justify-between items-center">
                    <span>📊 Descargar Excel</span>
                    <span class="text-blue-500">→</span>
                </button>
                <button class="w-full p-4 glass-card text-left flex justify-between items-center">
                    <span>📢 Enviar Aviso</span>
                    <span class="text-blue-500">→</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        function navTo(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('sidebar').classList.remove('open');
        }

        // Lógica de seguridad y tiempo
        window.onload = () => {
            const now = new Date();
            const time = now.getHours() * 100 + now.getMinutes();
            const urlParams = new URLSearchParams(window.location.search);
            
            // Si viene del QR del campo (?mode=checkin)
            if(urlParams.has('mode')) navTo('scan');

            if(time < 1600 || time > 1730) {
                document.getElementById('checkinForm').classList.add('hidden');
                document.getElementById('lockMsg').classList.remove('hidden');
            }
            document.getElementById('timeInfo').innerText = "Ventanilla: 16:00 - 17:30";
            loadPlayers();
        };

        function loadPlayers() {
            const list = ["Andrea S.", "Regina M.", "Valeria G.", "Joaquín B."];
            document.getElementById('playerSelect').innerHTML = list.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function loginCoach() {
            const pin = document.getElementById('pin').value;
            if(["2000", "1234", "5566", "9900"].includes(pin)) {
                document.getElementById('coachAuth').classList.add('hidden');
                document.getElementById('coachTools').classList.remove('hidden');
            } else { alert("PIN Incorrecto"); }
        }

        async function submitAttendance() {
            const player = document.getElementById('playerSelect').value;
            const deviceId = localStorage.getItem('rivers_id') || crypto.randomUUID();
            localStorage.setItem('rivers_id', deviceId);

            const today = new Date().toLocaleDateString();
            if(localStorage.getItem('last_check') === today) {
                alert("Ya registraste asistencia hoy.");
                return;
            }

            // Aquí va tu URL de Google Apps Script
            alert("✅ Asistencia registrada para " + player);
            localStorage.setItem('last_check', today);
            navTo('home');
        }
    </script>
</body>
</html>
