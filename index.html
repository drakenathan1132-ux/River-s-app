<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVERS COMMAND PRO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #00FFFF; --purple: #7000FF; --bg: #050505; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; margin: 15px; }
        header { padding: 30px; text-align: center; }
        .logo { width: 70px; filter: drop-shadow(0 0 10px var(--neon)); cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: #000; border-top: 1px solid #333; z-index: 100; }
        .nav-btn { color: #555; font-size: 1.5rem; cursor: pointer; }
        .nav-btn.active { color: var(--neon); }
        .btn-action { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .page { display: none; }
        select, textarea { width: 100%; padding: 12px; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; margin-bottom: 10px; }
        .qr-box { background: #fff; padding: 10px; border-radius: 15px; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
    
<header>
    <img src="logo.png" class="logo" onclick="auth()">
    <h1 style="font-size: 1.2rem; color: var(--neon);">RIVERS COMMAND</h1>
</header>

<main id="view-home" class="page" style="display:block;">
    <div class="glass">
        <h2>📋 Reglamento</h2>
        <p>1. 15 min de tolerancia.<br>2. 3 retardos = 1 falta.<br>3. 3 faltas = baja.</p>
    </div>
    <div class="glass">
        <h3>📣 Muro</h3>
        <div id="feed-container">Cargando...</div>
    </div>
</main>

<main id="view-check" class="page">
    <div class="glass">
        <h2>⏱️ Registro</h2>
        <select id="playerSelect"></select>
        <button class="btn-action" onclick="send()">REGISTRAR</button>
        <div id="qr-display" class="qr-box" style="display:none;"></div>
    </div>
</main>

<nav>
    <div class="nav-btn active" onclick="nav('view-home', this)">🏠</div>
    <div class="nav-btn" onclick="nav('view-check', this)">⏱️</div>
    <div id="admin-tab" class="nav-btn" style="display:none;" onclick="nav('view-admin', this)">⚙️</div>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_4wK-gG4yhXQUNUWYV8r2OjMcxETNWNnWXsI-m7nPBOCZPZkKg14F9OMcNrt-_vTjtA/exec";
    let clicks = 0;

    async function init() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        const sel = document.getElementById('playerSelect');
        sel.innerHTML = data.players.map(p => `<option value="${p}">${p}</option>`).join('');
        document.getElementById('feed-container').innerHTML = data.feed.map(f => `<div><b>${f.author}:</b> ${f.content}</div>`).join('<hr>');
        
        sel.onchange = (e) => {
            const qr = document.getElementById('qr-display');
            qr.style.display = 'block';
            qr.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${e.target.value}">`;
        };
    }

    async function send() {
        const name = document.getElementById('playerSelect').value;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type:'attendance', name: name}) });
        alert("Enviado");
    }

    function auth() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PIN:") === "2000") document.getElementById('admin-tab').style.display = "block";
            clicks = 0;
        }
    }

    function nav(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    init();
</script>
    <script>
// Registro del Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
                console.log('✅ SW registrado:', registration.scope);
                
                // Detectar actualizaciones
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Hay una nueva versión disponible
                            if (confirm('🔄 Nueva versión disponible. ¿Actualizar ahora?')) {
                                newWorker.postMessage({ type: 'SKIP_WAITING' });
                                window.location.reload();
                            }
                        }
                    });
                });
            })
            .catch((error) => {
                console.error('❌ SW registration failed:', error);
            });
    });
    
    // Recargar cuando el SW se active
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
            refreshing = true;
            window.location.reload();
        }
    });
}

// Detectar modo offline/online
window.addEventListener('online', () => {
    console.log('🟢 Conexión restaurada');
    // Opcional: mostrar notificación al usuario
});

window.addEventListener('offline', () => {
    console.log('🔴 Sin conexión');
    // Opcional: mostrar banner de offline
});
    </script>
</body>
</html>
