<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVERS TOCHITO CLUB</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0A0A0A; color: #f0f0f0; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { text-align: center; padding: 20px; background: linear-gradient(180deg, #00FFFF22 0%, #0A0A0A 100%); }
        .logo-img { width: 60px; }
        .section-content { display: none; padding: 20px; }
        .section-content.active { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-primary { background: #00FFFF; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; color: #555; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: #00FFFF; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" class="logo-img">
    <h1>RIVERS TOCHITO CLUB</h1>
</header>

<main>
    <section id="reglamento" class="section-content active">
        <div class="glass-card">
            <h2 style="color:#00FFFF">📋 Reglamento de Asistencia</h2>
            <p><strong>4:45 PM:</strong> Inicia registro.</p>
            <p><strong>5:00 PM:</strong> Límite puntual. Después es retardo.</p>
            <p><strong>5:30 PM:</strong> Cierre de sistema.</p>
        </div>
    </section>

    <section id="checkin" class="section-content">
        <div class="glass-card">
            <h2>📱 Check-In QR</h2>
            <div id="reader" style="width:100%; border-radius:15px; overflow:hidden;"></div>
            <button class="btn-primary" id="startBtn">🎯 Escanear Código</button>
            
            <div id="result-box" style="display:none; margin-top:15px; text-align:center;">
                <h3 id="player-name" style="color:#00FFFF"></h3>
                <p id="time-status"></p>
                <button class="btn-primary" onclick="confirmRecord()">✅ Confirmar y Subir a Nube</button>
            </div>
        </div>
    </section>

    <section id="admin" class="section-content">
        <div class="glass-card">
            <h2>🔐 Panel de Control</h2>
            <div id="login-admin">
                <input type="password" id="pass" placeholder="Pin de Coach">
                <button class="btn-primary" onclick="accessAdmin()">Entrar al Panel</button>
            </div>
            <div id="panel-data" style="display:none;">
                <p><strong>Coach:</strong> Tadeo / Staff</p>
                <p><strong>Jugadoras:</strong> 80 Registradas</p>
                <button class="btn-primary" style="background:#ff4444" onclick="location.reload()">Cerrar Sesión</button>
            </div>
        </div>
    </section>
</main>

<nav>
    <div class="nav-item active" onclick="showSection('reglamento', this)"><span>📋</span><p>Reglas</p></div>
    <div class="nav-item" onclick="showSection('checkin', this)"><span>📱</span><p>Check-In</p></div>
    <div class="nav-item" onclick="showSection('admin', this)"><span>🔐</span><p>Admin</p></div>
</nav>

<script>
    const SCRIPT_URL = "PEGAR_AQUI_TU_URL_DE_APPS_SCRIPT";
    let tempPlayer = null;

    function showSection(id, el) {
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    const scanner = new Html5Qrcode("reader");
    document.getElementById('startBtn').onclick = () => {
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            scanner.stop();
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes();
            const totalMin = (hour * 60) + min;

            // Lógica de tiempo: 4:45 PM = 1005 min, 5:00 PM = 1020 min
            let status = (totalMin <= 1020) ? "PRESENTE" : "RETARDO";
            
            tempPlayer = { name: text, status: status, date: now.toLocaleDateString(), time: now.toLocaleTimeString() };
            document.getElementById('player-name').innerText = text;
            document.getElementById('time-status').innerText = "Estatus: " + status;
            document.getElementById('result-box').style.display = "block";
        });
    };

    async function confirmRecord() {
        alert("Sincronizando con Google Sheets...");
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(tempPlayer)
            });
            alert("¡Guardado exitoso!");
            document.getElementById('result-box').style.display = "none";
        } catch(e) {
            alert("Error de conexión. Se intentará luego.");
        }
    }

    function accessAdmin() {
        if(document.getElementById('pass').value === "2000") { // Pon tu clave aquí
            document.getElementById('login-admin').style.display = "none";
            document.getElementById('panel-data').style.display = "block";
        } else {
            alert("Clave incorrecta");
        }
    }
</script>
</body>
</html>
