  <!DOCTYPE html>
  <html lang="es">  
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Sistema de gestión de asistencias para RIVERS Tochito Club">
    <meta name="theme-color" content="#0A0A0A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>RIVERS Tochito Club</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-180x180-icon.png">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-cyan: #00D9FF;
            --primary-pink: #FF006E;
            --bg-dark: #0A0A0A;
            --bg-card: #1a1a1a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }    
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-pink));
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0, 217, 255, 0.1);
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #111;
            z-index: 1000;
            transition: left 0.3s ease;
        }
        
        .sidebar.open { left: 0; }
        
        .nav-item { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        
        .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .status-online { background: #10b981; }
        .status-offline { background: #ef4444; }
        
        .hidden { display: none !important; }
     </style>
  </head>
<body
    <div id="sidebarOverlay" class="fixed inset-0 bg-black opacity-50 z-40 hidden">
             </div>
    <aside class="sidebar" id="sidebar">
        <div class="p-6 border-b border-gray-800">
            <h2 class="text-xl font-bold text-cyan-400">RIVERS Admin</h2>
             </div>
        <nav class="mt-4">
            <div class="nav-item" data-tab="home"><span>🏠</span> Inicio</div>
            <div class="nav-item" data-tab="scan"><span>📷</span> Escanear</div>
            <div class="nav-item"
 data-tab="coach"><span>👨‍💼</span> Coach Panel</div>
        </nav>
    </aside>
       </div>  
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#1a1a1a]">
    <div class="flex items-center gap-3">        
        <button id="menuBtn"class=tex-2x1tex-white"> <i class="fas fa-bars"></i>
        </button>
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="RIVERS" class="h-8 w-auto object-contain">
            <h1 class="font-bold text-lg text-white">RIVERS</h1>
        </div>
    </div>
    <span id="statusBadge" class="status-badge status-online text-xs px-2 py-1 rounded-full">Online</span>
        </header>
    <main class="p-4 pb-20">
        <div id="homeTab" class="tab-content">
            <div class="card mb-6">
                <h2 class="text-cyan-400 font-bold mb-2">Próxima Sesión</h2>
                <p id="sessionDate" class="text-2xl font-bold">Cargando...</p>
                <p id="sessionLocation" class="text-gray-400">Campos de la Laguna</p>
            </div>
            <div class="card mb-6">
                <h3 class="font-bold mb-4">📢 Avisos Recientes</h3>
                <div id="feedContainer" class="text-sm text-gray-300">Cargando avisos...</div>
            </div>

            <div class="card">
                <h3 class="font-bold mb-4">📊 Mis Estadísticas</h3>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div><p id="asistencias" class="text-xl text-green-400">0</p><p class="text-xs">Asistencias</p></div>
                    <div><p id="retardos" class="text-xl text-yellow-400">0</p><p class="text-xs">Retardos</p></div>
                    <div><p id="faltas" class="text-xl text-red-400">0</p><p class="text-xs">Faltas</p></div>
                </div>
            </div>
        </div>

        <div id="scanTab" class="tab-content hidden">
            <div class="card">
                <div id="reader" class="w-full"></div>
            </div>
        </div>

        <div id="coachTab" class="tab-content hidden">
            <div id="coachLogin" class="card text-center">
                <input type="password" id="coachPIN" placeholder="PIN" class="bg-gray-800 p-2 rounded mb-4 text-center block w-full">
                      <button id="unlockCoach" class="btn-primary w-full py-2 rounded"
                 >Entrar
              </button>
            </div>
            <div id="coachPanel" class="hidden">
                <div class="card bg-white p-4 mb-4 flex justify-center" id="qrContainer"></div>
                <button id="exportCSV" class="btn-primary w-full py-3 rounded font-bold">📥 EXPORTAR ASISTENCIAS
                </button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
    <script>
        // Vercel Web Analytics
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        // Registro del Service Worker para modo Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ SW Activo'))
                    .catch(err => console.error('❌ Error SW', err));
            });
        }

        // Manejo de conexión
        window.addEventListener('online', () => updateStatus(true));
        window.addEventListener('offline', () => updateStatus(false));

        function updateStatus(online) {
            const b = document.getElementById('statusBadge');
            b.textContent = online ? 'Online' : 'Offline';
            b.className = `status-badge ${online ? 'status-online' : 'status-offline'}`;
        }
    </script>
</body>
</html>
