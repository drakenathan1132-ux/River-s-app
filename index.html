<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVERS Command Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary-blue: #1e40af; 
            --accent-red: #dc2626; 
            --bg-dark: #050505; 
        }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; }
        
        .glass { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; 
        }
        
        /* Botones con efecto de pulso y escala */
        .btn-rivers {
            background: linear-gradient(135deg, var(--primary-blue), #3b82f6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
        }
        .btn-rivers:active { transform: scale(0.92); filter: brightness(1.2); }

        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0a0a0a; z-index: 100; transition: 0.4s ease;
            border-right: 1px solid #222;
        }
        #sidebar.open { left: 0; }
        .tab-content { display: none; animation: slideUp 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="sidebar" class="p-6">
        <img src="/logo.png" class="w-16 h-16 mx-auto mb-4 rounded-full border-2 border-blue-500">
        <nav class="space-y-4">
            <button onclick="navTo('home')" class="w-full text-left p-4 hover:bg-blue-900/20 rounded-xl">🏠 Inicio</button>
            <button onclick="navTo('feed')" class="w-full text-left p-4 hover:bg-blue-900/20 rounded-xl">📢 Avisos</button>
            <button onclick="navTo('coach')" class="w-full text-left p-4 hover:bg-red-900/20 rounded-xl border-t border-white/5 mt-4 pt-4">👨‍💼 Panel Coach</button>
        </nav>
    </div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <button onclick="toggleMenu()" class="p-2 bg-white/5 rounded-full">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="text-xs font-bold tracking-widest text-blue-500 uppercase">Rivers Hub</span>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <section id="checkinMode" class="tab-content">
            <div class="glass p-8 text-center border-blue-500/30 border-2">
                <h2 class="text-2xl font-bold mb-2">Pase de Lista</h2>
                <p id="timeStatus" class="text-xs mb-6 text-gray-400 font-mono"></p>
                
                <div id="checkinForm">
                    <select id="playerList" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none"></select>
                    <button id="submitBtn" onclick="processAttendance()" class="btn-rivers w-full py-4 rounded-2xl font-black tracking-tighter">REGISTRAR ENTRADA</button>
                </div>
                <div id="lockMessage" class="hidden text-red-500 font-bold p-4">🔒 REGISTRO CERRADO</div>
            </div>
        </section>

        <section id="home" class="tab-content active">
            <div class="glass p-6 mb-6 overflow-hidden relative">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-600/20 blur-3xl"></div>
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">Próxima Sesión</p>
                <p id="displayDay" class="text-3xl font-black italic">MARTES Y JUEVES</p>
                <p class="text-sm text-gray-400">16:45 hrs • Campo Principal</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 text-center"><p id="stat-asist" class="text-2xl font-bold text-blue-400">0</p><p class="text-[10px] text-gray-500 uppercase">Entrenos</p></div>
                <div class="glass p-5 text-center"><p id="stat-falt" class="text-2xl font-bold text-red-500">0</p><p class="text-[10px] text-gray-500 uppercase">Faltas</p></div>
            </div>
        </section>

        <section id="coach" class="tab-content">
            <div id="coachLogin" class="glass p-8 text-center">
                <p class="text-gray-400 mb-4">Acceso de Mando</p>
                <input type="password" id="coachPIN" placeholder="PIN" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-center text-xl mb-4 outline-none">
                <button onclick="validateCoach()" class="w-full bg-white text-black p-4 rounded-2xl font-bold hover:bg-gray-200">ENTRAR</button>
            </div>
            <div id="adminPanel" class="hidden space-y-4">
                <div class="glass p-6 border-red-500/20 border">
                    <h3 class="font-bold text-red-500 mb-4 uppercase text-sm tracking-widest">Controles de Admin</h3>
                    <button class="w-full p-4 bg-white/5 rounded-xl text-left text-sm mb-2">📊 Ver Lista de Asistencia</button>
                    <button class="w-full p-4 bg-white/5 rounded-xl text-left text-sm mb-2">📢 Publicar Aviso</button>
                    <button onclick="logoutCoach()" class="w-full p-4 text-gray-500 text-xs">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_4wK-gG4yhXQUNUWYV8r2OjMcxETNWNnWXsI-m7nPBOCZPZkKg14F9OMcNrt-_vTjtA/exec";
        
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function navTo(id) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        }

        // LÓGICA DE SEGURIDAD
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('mode')) navTo('checkinMode');
            
            checkTimeLock();
            loadPlayers();
        };

        function checkTimeLock() {
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes();
            const timeVal = hour * 100 + min;

            // Bloqueo: 16:00 (1600) a 17:30 (1730)
            if(timeVal < 1600 || timeVal > 1730) {
                document.getElementById('checkinForm').classList.add('hidden');
                document.getElementById('lockMessage').classList.remove('hidden');
            }
            document.getElementById('timeStatus').innerText = `Ventana de registro: 16:00 - 17:30`;
        }

        async function processAttendance() {
            const player = document.getElementById('playerList').value;
            const deviceId = localStorage.getItem('rivers_device_id') || crypto.randomUUID();
            localStorage.setItem('rivers_device_id', deviceId);

            const lastCheck = localStorage.getItem('last_checkin_date');
            const today = new Date().toLocaleDateString();

            if(lastCheck === today) {
                alert("❌ Este teléfono ya registró una asistencia hoy.");
                return;
            }

            // ENVIAR A GOOGLE SHEETS
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Necesario para Apps Script si no hay CORS configurado
                    body: JSON.stringify({ player, deviceId, date: today })
                });
                localStorage.setItem('last_checkin_date', today);
                alert(`✅ ¡Listo ${player}! Tu asistencia fue enviada al Coach.`);
                navTo('home');
            } catch (e) {
                alert("Error de conexión. Intenta de nuevo.");
            }
        }

        function validateCoach() {
            const pin = document.getElementById('coachPIN').value;
            const pinsValidos = ["2000", "1234", "5566", "9900"]; // Los 4 PINs para los 4 coaches
            if(pinsValidos.includes(pin)) {
                document.getElementById('coachLogin').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else { alert("PIN Incorrecto"); }
        }

        function loadPlayers() {
            const players = ["Andrea S.", "Regina M.", "Valeria G.", "Sofía L."]; // Esto debería venir de tu Sheet
            document.getElementById('playerList').innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
        }
    </script>
</body>
</html>
